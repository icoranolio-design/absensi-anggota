<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABSENSI ROBLOX</title>

<style>

body{
background:#1a1208;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
width:350px;
background:#2a1b0d;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px #ff880055;
}

h1{
text-align:center;
color:#ff9d00;
margin-bottom:5px;
}

p{
text-align:center;
color:#d6b38a;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#3a2612;
color:white;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff8800,#ffae00);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.status{
margin-top:15px;
text-align:center;
font-size:14px;
color:#ffcc80;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
display:block;
margin:0 auto 15px auto;
border:3px solid #ff9d00;
object-fit:cover;
}

</style>
</head>

<body>

<div class="card">

<img id="avatar" class="avatar"
src="https://tr.rbxcdn.com/180DAY-avatar-headshot.png"
>

<h1>ABSENSI DIGITAL</h1>
<p>Kepolisian Republik Indonesia</p>

<input type="text" id="roblox"
placeholder="Username Roblox">

<input type="text" id="pangkat"
placeholder="Pangkat">

<input type="text" id="jabatan"
placeholder="Jabatan">

<button onclick="absen()">MASUK</button>

<div class="status" id="status"></div>

</div>

<script>

const webhook =
"https://discord.com/api/webhooks/1514474696106705026/hLfoi_p9Iz5HhFpJWXyiLorKa-S-cx5HUTaTZTpIaKlKtlyRxqn4MGEcdumFuqvQnV2p";

function getTanggalHariIni(){

const today = new Date();

const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');

return `${yyyy}-${mm}-${dd}`;

}

async function getRobloxData(username){

const response = await fetch(
"https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usernames:[username]
})
}
);

const data = await response.json();

if(!data.data || !data.data.length){

return null;

}

return data.data[0];

}

async function getAvatar(userId){

const response = await fetch(
`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=420x420&format=Png&isCircular=false`
);

const data = await response.json();

return data.data[0].imageUrl;

}

async function absen(){

const username =
document.getElementById("roblox").value;

const pangkat =
document.getElementById("pangkat").value;

const jabatan =
document.getElementById("jabatan").value;

if(!username){

document.getElementById("status").innerHTML =
"⚠️ Masukkan username Roblox!";

return;

}

const userData = await getRobloxData(username);

if(!userData){

document.getElementById("status").innerHTML =
"❌ Username Roblox tidak ditemukan!";

return;

}

const userId = userData.id;

const tanggalHariIni = getTanggalHariIni();

const lastAbsen =
localStorage.getItem(`absen_${userId}`);

if(lastAbsen === tanggalHariIni){

document.getElementById("status").innerHTML =
"⚠️ Akun ini sudah absen hari ini!";

return;

}

const avatarUrl = await getAvatar(userId);

document.getElementById("avatar").src = avatarUrl;

const jam = new Date().toLocaleTimeString('id-ID');

const data = {
embeds:[{
title:"📌 LAPORAN PRESENSI DIGITAL",
color:16753920,
thumbnail:{
url:avatarUrl
},

description:
`👤 Username Roblox
**${userData.name}**

🆔 User ID
**${userId}**

🎖 Pangkat
**${pangkat}**

💼 Jabatan
**${jabatan}**

🕒 Jam Absen
**${jam}**

📍 Status Kehadiran
**HADIR**`
}]
};

fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

localStorage.setItem(
`absen_${userId}`,
tanggalHariIni
);

document.getElementById("status").innerHTML =
"✅ Absensi berhasil dikirim!";

}

</script>

</body>
</html>
